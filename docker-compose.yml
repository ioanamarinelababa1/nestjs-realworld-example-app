services:
  api:
    build: .
    ports:
      - "8080:3000"
    #volumes:
    #  - .:/usr/src/app
    #  - /usr/src/app/node_modules
    environment:
      - NODE_ENV=development
      - DB_TYPE=postgres
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=user
      - DB_PASSWORD=pass
      - DB_NAME=nestjsrealworld
    depends_on:
      - db

  db:
    image: postgres:alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=nestjsrealworld
    ports:
      - "5432:5432"